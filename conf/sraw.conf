# SRAW Format Configuration
# Fourier UNIFG Project
# =====================
# DO NOT CHANGE these values without regenerating all .sraw files
#
# Only primitive (non-derivable) parameters are defined here.
# All derived quantities (AMP_INT_MAX, TIME_MAX, FREQ_MAX, …)
# are computed by get_constants() in sraw_lib.py.

FORMAT_VERSION=SRAW-1

# Samples
MAX_SAMPLES=2000000

# Time domain
TIME_RESOLUTION_S=0.0000125

# Frequency domain
FREQ_RESOLUTION_HZ=0.01

# Amplitude — time domain: 10 µV/step  →  ±5 V at ±500000
AMP_TIME_RESOLUTION_V=0.00001

# Amplitude — frequency domain: 10 µVs/step  →  ±5 Vs at ±500000
AMP_FREQ_RESOLUTION_VS=0.00001

# ffmpeg executable: absolute path or simply "ffmpeg" if present in PATH
FFMPEG_PATH=ffmpeg

# output sample rate for encoded MP3
MP3_EXPORT_SAMPLE_RATE_HZ=44100
