# SRAW Format Configuration
# Fourier UNIFG Project
# =====================
#
# Only MAX_SAMPLES is defined here (shared across all tools).
# Resolution constants (TIME_RES, FREQ_RES, AMP_TIME_RES, AMP_FREQ_RES)
# are now embedded in each .sraw file header (SRAW-1.1 format).
# Legacy files without embedded constants are read as SRAW-1
# (10 µV resolution, ±5 V range).

MAX_SAMPLES=2000000
